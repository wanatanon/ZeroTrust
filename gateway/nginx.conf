events {}

http {

  # 🔥 Real IP (สำคัญมาก ถ้ามี proxy หน้า)
  real_ip_header X-Forwarded-For;

  # 🔥 Rate limit zones
  limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;

  # 🔥 Connection limit
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  server {
    listen 80;
    server_tokens off;

    # =========================
    # 🔥 BASIC HARDENING
    # =========================

    # ❌ Block method แปลกๆ
    if ($request_method !~ ^(GET|POST)$ ) {
      return 405;
    }

    # ❌ Block SQL Injection (แรงขึ้น)
    if ($request_uri ~* "(union|select|drop|insert|delete|update|--|#|or\+1=1|or 1=1|1=1)") {
      return 403;
    }

    # ❌ Block XSS (แรงขึ้น)
    if ($query_string ~* "(<script>|javascript:|onerror|onload|<img|<svg|alert\()") {
      return 403;
    }

    # ❌ Block scanner / bot
    if ($http_user_agent ~* (curl|wget|python|nikto|sqlmap|nmap|dirbuster)) {
      return 403;
    }

    # ❌ Block direct IP access (optional)
    if ($host ~* "^\d+\.\d+\.\d+\.\d+$") {
      return 403;
    }

    # =========================
    # 🔥 SECURITY HEADERS
    # =========================

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.gstatic.com";

    # =========================
    # 🔥 RATE LIMIT + CONNECTION
    # =========================

    limit_req zone=global burst=20 nodelay;
    limit_conn addr 10;

    # =========================
    # 🔥 DEVICE LOG API
    # =========================

    location /device-log {

      # 🔥 เฉพาะ POST เท่านั้น
      if ($request_method != POST) {
        return 405;
      }

      proxy_pass http://zerotrust-web:4000;

      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # =========================
    # 🔥 LOGIN API (กัน brute force)
    # =========================

    location /login {

      limit_req zone=login burst=5 nodelay;

      proxy_pass http://zerotrust-web:4000;

      proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================
    # 🔥 DEFAULT (FRONTEND)
    # =========================

    location / {

      proxy_pass http://login-web:80;

      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Host $host;
    }

    # =========================
    # 🔥 DENY ALL อื่นๆ
    # =========================

    location ~* \.(env|git|htaccess|config|ini|log)$ {
      deny all;
    }

    location ~* /(admin|phpmyadmin|wp-admin) {
      return 403;
    }

    # =========================
    # 🔥 TIMEOUT PROTECTION
    # =========================

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

  }
}