<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="layout.css">
<script src="layout.js"></script>

<title>Login</title>

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase/firebase-config.js"></script>

<script src="security/network-check.js"></script>
<script src="security/device-check.js"></script>
<script src="security/sqlInjection.js"></script>
<script src="security/xssProtection.js"></script>
<script src="security/bruteForce.js"></script>

<script src="login.js"></script>

</head>

<body>

<script>
loadLayout()
</script>

<div class="login-container">
  <div class="login-box">

    <h1>Login</h1>

    <!-- เพิ่ม input-group เพื่อให้มี label -->
    <div class="input-group">
      <label for="email">email</label>
      <input id="email" type="email" placeholder="example@email.com">
    </div>

    <div class="input-group">
      <label for="password">password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <button onclick="login()">login</button>

    <h3 id="countdown"></h3>

  </div>
</div>

<!-- 🔥 ย้าย function ขึ้นมาก่อน -->
<script>

function detectBrowser(){

 const agent = navigator.userAgent

 if(agent.includes("Edg")) return "Edge"
 if(agent.includes("Chrome")) return "Chrome"
 if(agent.includes("Firefox")) return "Firefox"
 if(agent.includes("Safari")) return "Safari"

 return "Unknown"
}

function sendDeviceLog(){

 const browser = detectBrowser()

 fetch("/device-log",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body: JSON.stringify({
   browser: browser,
   time: new Date().toISOString()
  }),
  keepalive:true
 }).catch(()=>{})

}

</script>

<script>

// 🔥 กันยิง log ซ้ำ
if(!sessionStorage.getItem("device_logged")){
 sendDeviceLog()
 sessionStorage.setItem("device_logged","true")
}

// แล้วค่อย check
checkDeviceTrust()

// กัน Back Cache
window.addEventListener("pageshow", function(event){
 if(event.persisted){
  window.location.reload()
 }
})

</script>

</body>
</html>
